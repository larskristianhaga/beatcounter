<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
<meta name="theme-color" content="#000000" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="BPM" />
<link rel="manifest" href="manifest.webmanifest" />
<link rel="apple-touch-icon" href="icons/icon-192.png" />
<link rel="icon" href="icons/icon-192.png" />
<title>BPM</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>
  <main id="app">
    <!-- whole-screen tap layer; sits below the controls but above background -->
    <button id="taplayer" class="taplayer" aria-label="Tap to the beat"></button>

    <div id="hud-top" class="hud hud-top">
      <div class="seg" role="tablist" aria-label="Input mode">
        <button class="seg-btn" data-mode="mic"  type="button" role="tab">Mic</button>
        <button class="seg-btn active" data-mode="both" type="button" role="tab">Both</button>
        <button class="seg-btn" data-mode="tap"  type="button" role="tab">Tap</button>
      </div>
      <button id="settings-btn" class="icon-btn" aria-label="Settings" type="button">⚙︎</button>
    </div>

    <div id="bpm-wrap" class="bpm-wrap">
      <div id="bpm" class="bpm idle">--</div>
      <div id="stability" class="stability" aria-hidden="true"><span></span></div>
    </div>

    <div id="status" class="status"></div>

    <div id="hud-bottom" class="hud hud-bottom">
      <button id="stop" class="icon-btn hidden" aria-label="Stop" type="button">■</button>
    </div>

    <div id="drawer" class="drawer hidden" role="dialog" aria-label="Settings">
      <div class="drawer-inner">
        <div class="drawer-row">
          <label for="opt-sens">Mic sensitivity</label>
          <input id="opt-sens" type="range" min="0.5" max="3" step="0.1" value="1.0" />
          <span id="opt-sens-val" class="val">1.0</span>
        </div>
        <div class="drawer-row">
          <label for="opt-min">BPM min</label>
          <input id="opt-min" type="range" min="40" max="120" step="1" value="70" />
          <span id="opt-min-val" class="val">70</span>
        </div>
        <div class="drawer-row">
          <label for="opt-max">BPM max</label>
          <input id="opt-max" type="range" min="120" max="220" step="1" value="180" />
          <span id="opt-max-val" class="val">180</span>
        </div>
        <div class="drawer-row">
          <label for="opt-agg">PLL aggressiveness</label>
          <input id="opt-agg" type="range" min="0.3" max="2" step="0.1" value="1.0" />
          <span id="opt-agg-val" class="val">1.0</span>
        </div>
        <div class="drawer-actions">
          <button id="opt-reset"  class="ghost" type="button">Reset tracker</button>
          <button id="opt-close"  class="primary" type="button">Done</button>
        </div>
      </div>
    </div>
  </main>
  <script src="app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('service-worker.js').catch(() => {});
      });
    }
  </script>
</body>
</html>
